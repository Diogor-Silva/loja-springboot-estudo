version: "3.9"

services:
  postgres:
    image: postgres:17
    container_name: postgres-loja-estudo
    environment:
      POSTGRES_DB: loja_estudo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin-loja-estudo
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5052:80"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data: